# =============================================================================
# config/folders.conf — Project folder structure template
# =============================================================================
# Each non-blank, non-comment line is a relative path created under the
# project root directory.
#
# Tokens:
#   $PROJECT  — expands to the project root chosen at runtime
#   Lines not starting with / or $PROJECT are treated as relative to $PROJECT
#
# Usage: devsetup --scaffold [project-name]
# =============================================================================

