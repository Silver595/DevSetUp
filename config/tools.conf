# =============================================================================
# config/tools.conf — Declarative tool list for devsetup
# =============================================================================
# Format: CATEGORY:TOOL_NAME
#   CATEGORY  - grouping label shown in the TUI menu
#   TOOL_NAME - must match an install_<name> function in lib/install.sh
#
# Lines starting with # are ignored. Blank lines are ignored.
# =============================================================================

# ── Container & Orchestration ────────────────────────────────────────────────
DevOps:docker
DevOps:kubectl
DevOps:helm

# ── Infrastructure as Code ───────────────────────────────────────────────────
IaC:terraform

# ── Cloud CLIs ───────────────────────────────────────────────────────────────
Cloud:awscli

# ── Version Control ──────────────────────────────────────────────────────────
VCS:git

# ── Languages & Runtimes ─────────────────────────────────────────────────────
Languages:nvm
Languages:python
