# =============================================================================
# config/aliases.conf — Shell aliases injected by devsetup
# =============================================================================
# Format:  [SectionName]  (optional grouping header)
#          KEY='value'    (alias definition, value may include single quotes)
#
# Aliases will be wrapped in guarded markers in ~/.bashrc / ~/.zshrc.
# Lines starting with # are ignored. Blank lines are ignored.
# =============================================================================

# ── Docker ───────────────────────────────────────────────────────────────────
[Docker]
dk='docker'
dkc='docker compose'
dkps='docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'
dkimg='docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"'
dkrm='docker rm $(docker ps -aq)'
dkstop='docker stop $(docker ps -q)'
dkpruneall='docker system prune -af --volumes'
dklog='docker logs -f'
dksh='docker exec -it'

# ── Kubernetes ───────────────────────────────────────────────────────────────
[Kubernetes]
k='kubectl'
kg='kubectl get'
kd='kubectl describe'
kl='kubectl logs -f'
kex='kubectl exec -it'
kns='kubectl config set-context --current --namespace'
kctx='kubectl config use-context'
kgp='kubectl get pods -o wide'
kgs='kubectl get svc'
kgn='kubectl get nodes'

# ── Terraform ─────────────────────────────────────────────────────────────────
[Terraform]
tf='terraform'
tfi='terraform init'
tfp='terraform plan'
tfa='terraform apply'
tfd='terraform destroy'
tff='terraform fmt -recursive'
tfv='terraform validate'
tfo='terraform output'

# ── Git ───────────────────────────────────────────────────────────────────────
[Git]
g='git'
gs='git status -sb'
ga='git add'
gaa='git add --all'
gc='git commit -m'
gca='git commit --amend --no-edit'
gp='git push'
gpl='git pull --rebase'
gd='git diff'
gds='git diff --staged'
gl='git log --oneline --graph --decorate -20'
gb='git branch -vv'
gco='git checkout'
gcb='git checkout -b'
gst='git stash'
gstp='git stash pop'
grb='git rebase'
grs='git restore'

# ── AWS ───────────────────────────────────────────────────────────────────────
[AWS]
awsid='aws sts get-caller-identity'
awswho='aws sts get-caller-identity --query Account --output text'

# ── Navigation & Utilities ───────────────────────────────────────────────────
[Utils]
ll='ls -lah --color=auto'
la='ls -A'
l='ls -CF'
..='cd ..'
...='cd ../..'
....='cd ../../..'
mkcd='() { mkdir -p "$1" && cd "$1"; }'
ports='ss -tulnp'
path='echo $PATH | tr ":" "\n"'
myip='curl -s https://ifconfig.me'
weather='curl -s wttr.in'
